<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="커버 스튜디오">
<meta name="theme-color" content="#2A2A28">
<title>안시내 커버 스튜디오</title>
<style>
  @font-face{ font-family:'Pretendard'; font-weight:45 920; font-style:normal; font-display:swap;
    src:url('https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations'); }
  :root{ --cream:#EFE9DC; --ink:#2A2A28; --muted:#6b6250; --green:#3A5A40; --line:#d8d2c4; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Pretendard',system-ui,sans-serif; color:var(--ink);
        background:#f6f3ec; padding:24px; -webkit-font-smoothing:antialiased; }
  .head{ max-width:880px; margin:0 auto 14px; }
  h1{ font-size:20px; font-weight:700; margin:0 0 10px; }
  .mode{ display:flex; gap:8px; }
  .mode button{ font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
    padding:10px 16px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--ink); }
  .mode button.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .wrap{ max-width:880px; margin:0 auto; display:grid; grid-template-columns:360px 1fr; gap:28px; align-items:start; }
  .panel{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; }
  label{ display:block; font-size:12px; color:var(--muted); margin:14px 0 5px; font-weight:600; }
  label:first-of-type{ margin-top:0; }
  input[type=text], textarea, input[type=file]{ width:100%; font-family:inherit; font-size:14px;
     padding:9px 11px; border:1px solid var(--line); border-radius:9px; background:#fbfaf6; resize:vertical; }
  textarea{ min-height:64px; line-height:1.4; }
  input[type=range]{ width:100%; }
  .row{ display:flex; gap:10px; } .row>div{ flex:1; }
  button.act{ font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
     border:1px solid var(--green); background:var(--green); color:#fff; padding:11px 16px;
     border-radius:10px; width:100%; margin-top:18px; }
  button.ghost{ background:#fff; color:var(--green); }
  .stage{ position:sticky; top:24px; }
  .frame{ width:100%; border-radius:12px; overflow:hidden; border:1px solid var(--line); background:#111; margin:0 auto; }
  canvas#c{ width:100%; height:auto; display:block; }
  .hint{ font-size:12px; color:var(--muted); margin-top:10px; line-height:1.6; }
  .swatches{ display:flex; gap:8px; margin-top:6px; align-items:center; }
  .sw{ width:26px; height:26px; border-radius:50%; border:1px solid var(--line); cursor:pointer; }
  .seg{ display:flex; gap:6px; }
  .seg button{ flex:1; margin-top:0; background:#fff; color:var(--ink); border:1px solid var(--line); padding:8px 4px; font-weight:500; font-family:inherit; font-size:14px; border-radius:9px; cursor:pointer; }
  .seg button.on{ background:var(--green); color:#fff; border-color:var(--green); }
  @media (max-width:760px){
    body{ padding:14px; }
    .wrap{ grid-template-columns:1fr; gap:18px; }
    .stage{ position:static; order:-1; }
    .frame{ max-width:300px; }
    h1{ font-size:22px; }
  }
</style>
</head>
<body>
<div class="head">
  <h1>안시내 커버 스튜디오</h1>
  <div class="mode" id="mode">
    <button data-m="feed" class="on">오늘의 책 · 피드 4:5</button>
    <button data-m="reels">릴스 9:16</button>
  </div>
</div>

<div class="wrap">
  <div class="panel">
    <label>사진 (어둡고 무드 있는 컷)</label>
    <input type="file" id="photo" accept="image/*">

    <div class="row">
      <div><label>사진 세로 위치</label><input type="range" id="posy" min="0" max="100" value="50"></div>
      <div><label>사진 어둡기</label><input type="range" id="scrim" min="20" max="80" value="52"></div>
    </div>

    <label>훅 문장 (엔터로 줄바꿈)</label>
    <textarea id="hook">여행은 왜
돌아오려고 떠날까</textarea>

    <label>한 줄 ( | 뒤에 들어가요 )</label>
    <input type="text" id="tag" value="다 읽고 한참 멍했던 여행 에세이">

    <div class="row">
      <div><label>훅 굵기</label><input type="range" id="weight" min="300" max="800" value="600" step="50"></div>
      <div><label>훅 크기</label><input type="range" id="hsize" min="70" max="130" value="94" step="2"></div>
    </div>

    <label>자간 (← 좁게 · 넓게 →)</label>
    <input type="range" id="track" min="-10" max="2" value="-2" step="0.5">

    <label>정렬 (제목·부제목)</label>
    <div class="seg" id="seg">
      <button type="button" data-a="left" class="on">왼쪽</button>
      <button type="button" data-a="center">가운데</button>
      <button type="button" data-a="right">오른쪽</button>
    </div>

    <label>텍스트 상하 위치 (↑ 위 · 아래 ↓)</label>
    <input type="range" id="ty" min="0" max="100" value="92" step="1">

    <label>시리즈 이름 (좌상단 라벨)</label>
    <input type="text" id="series" value="오늘의 책">

    <div class="row">
      <div><label>회차 / EP</label><input type="text" id="no" value="01"></div>
      <div><label>계정</label><input type="text" id="handle" value="@sinaeannn"></div>
    </div>

    <label>글자 색</label>
    <div class="swatches" id="swatches"></div>

    <button class="act" id="dl">PNG로 저장</button>
    <button class="act ghost" id="copy">클립보드로 복사</button>
    <p class="hint">피드는 첫 장으로, 릴스는 '커버'로 지정. 회차/EP만 매주 바꾸면 시리즈로 묶여요. 폰트가 기본체로 보이면 인터넷 연결 후 새로고침.</p>
  </div>

  <div class="stage">
    <div class="frame" id="frame"><canvas id="c" width="1080" height="1350"></canvas></div>
    <p class="hint" id="safehint" style="display:none">점선 = 인스타 UI 안전영역(저장 이미지엔 안 나옴)</p>
  </div>
</div>

<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const frame=document.getElementById('frame');
const MODE={
  feed:{W:1080,H:1350,series:'오늘의 책',no:'01',pillX:48,pillY:48,bandTop:330,bandBot:1230,
        handleOff:52,tagSize:40,handleSize:30,hsize:94,safe:false,fmax:300,file:'오늘의책'},
  reels:{W:1080,H:1920,series:'단독주택 사용법',no:'EP1',pillX:56,pillY:150,bandTop:430,bandBot:1520,
        handleOff:340,tagSize:42,handleSize:32,hsize:100,safe:true,fmax:230,file:'단독주택사용법'},
};
let img=null, showSafe=false;
const state={ mode:'feed', series:'오늘의 책', no:'01', handle:'@sinaeannn',
  hook:'여행은 왜\n돌아오려고 떠날까', tag:'다 읽고 한참 멍했던 여행 에세이',
  posy:50, scrim:52, tcol:'#FFFFFF', weight:600, hsize:94, track:-2, align:'left', ty:92 };

const cols=['#FFFFFF','#EFE9DC','#E9DFcf'];
const sw=document.getElementById('swatches');
cols.forEach(col=>{ const d=document.createElement('div'); d.className='sw';
  d.style.background=col; d.onclick=()=>{state.tcol=col; draw();}; sw.appendChild(d); });

function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v; }
function bind(id,key){ const el=document.getElementById(id);
  el.addEventListener('input',()=>{ state[key]=el.value; draw(); }); }
['series','no','handle','hook','tag','posy','scrim','weight','hsize','track','ty'].forEach(k=>bind(k,k));

document.querySelectorAll('#seg button').forEach(b=>b.onclick=()=>{
  state.align=b.dataset.a;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on',x===b));
  draw();
});

document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{
  const m=b.dataset.m; if(m===state.mode) return;
  state.mode=m;
  document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b));
  const cfg=MODE[m];
  cv.width=cfg.W; cv.height=cfg.H;
  frame.style.aspectRatio=cfg.W+'/'+cfg.H;
  frame.style.maxWidth=cfg.fmax+'px';
  state.series=cfg.series; setVal('series',cfg.series);
  state.no=cfg.no; setVal('no',cfg.no);
  state.hsize=cfg.hsize; setVal('hsize',cfg.hsize);
  document.getElementById('safehint').style.display = cfg.safe?'block':'none';
  draw();
});

document.getElementById('photo').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const im=new Image(); im.onload=()=>{img=im; draw();}; im.src=URL.createObjectURL(f);
});

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawCover(W,H){
  if(!img){ ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#666'; ctx.font="500 38px Pretendard"; ctx.textAlign='center';
    ctx.fillText('사진을 올려주세요', W/2, H/2); ctx.textAlign='left'; return; }
  const ir=img.width/img.height, fr=W/H; let sw2,sh,sx,sy;
  if(ir>fr){ sh=img.height; sw2=sh*fr; sx=(img.width-sw2)/2; sy=0; }
  else{ sw2=img.width; sh=sw2/fr; sx=0; sy=(img.height-sh)*(state.posy/100); }
  ctx.drawImage(img,sx,sy,sw2,sh,0,0,W,H);
}

function draw(){
  const cfg=MODE[state.mode]; const W=cfg.W, H=cfg.H;
  ctx.clearRect(0,0,W,H);
  drawCover(W,H);

  ctx.fillStyle='rgba(0,0,0,'+(state.scrim/100)+')'; ctx.fillRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,H*0.52,0,H);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=g; ctx.fillRect(0,H*0.52,W,H*0.48);

  ctx.font="600 30px Pretendard";
  const pill=(state.series||'')+' · '+(state.no||'');
  const pw=ctx.measureText(pill).width+56;
  ctx.fillStyle='rgba(255,255,255,0.16)'; roundRect(cfg.pillX,cfg.pillY,pw,58,29); ctx.fill();
  ctx.fillStyle='#FFFFFF'; ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText(pill,cfg.pillX+28,cfg.pillY+30);

  ctx.textBaseline='alphabetic';
  const lines=(state.hook||'').split('\n');
  const hookSize=Number(state.hsize), lineH=Math.round(hookSize*1.2);
  const tagY=Math.round(cfg.bandTop+(state.ty/100)*(cfg.bandBot-cfg.bandTop));
  const hookBottom=tagY-80;
  const hookTop=hookBottom-(lines.length-1)*lineH;
  const alignX = state.align==='left'?64 : state.align==='right'? W-64 : W/2;

  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=10; ctx.shadowOffsetY=2;
  ctx.letterSpacing=state.track+'px';
  ctx.fillStyle=state.tcol; ctx.font=state.weight+" "+hookSize+"px Pretendard"; ctx.textAlign=state.align;
  lines.forEach((ln,i)=> ctx.fillText(ln, alignX, hookTop+i*lineH));
  ctx.restore();
  ctx.letterSpacing='0px';

  ctx.textAlign=state.align;
  ctx.fillStyle=state.tcol; ctx.font="500 "+cfg.tagSize+"px Pretendard";
  ctx.fillText('| '+(state.tag||''), alignX, tagY);

  ctx.textAlign='left';
  ctx.globalAlpha=0.82; ctx.font="500 "+cfg.handleSize+"px Pretendard";
  ctx.fillText(state.handle||'', 64, H-cfg.handleOff); ctx.globalAlpha=1;

  if(cfg.safe && showSafe){
    ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.setLineDash([12,10]); ctx.lineWidth=2;
    ctx.strokeRect(40,250,W-80,H-250-330); ctx.setLineDash([]);
  }
}

async function ready(){
  try{ await Promise.all([
    document.fonts.load("500 42px Pretendard","가"),
    document.fonts.load("600 30px Pretendard","가"),
    document.fonts.load("700 100px Pretendard","가"),
  ]); await document.fonts.ready; }catch(e){}
  frame.style.aspectRatio='1080/1350'; frame.style.maxWidth='300px';
  draw();
}
ready();

function exportPng(cb){ const cfg=MODE[state.mode];
  showSafe=false; draw();
  cv.toBlob(b=>{ showSafe=(cfg.safe); draw(); cb(b); },'image/png'); }
document.getElementById('dl').addEventListener('click',()=>{
  exportPng(async b=>{
    const name=MODE[state.mode].file+'_'+(state.no||'')+'.png';
    const file=new File([b],name,{type:'image/png'});
    const isTouch = matchMedia('(pointer:coarse)').matches;
    if(isTouch && navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file]}); return; }
      catch(e){ if(e && e.name==='AbortError') return; }
    }
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click();
  });
});
document.getElementById('copy').addEventListener('click',()=>{
  try{ exportPng(async b=>{ await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);
    const btn=document.getElementById('copy'); btn.textContent='복사됨'; setTimeout(()=>btn.textContent='클립보드로 복사',1500);
  }); }catch(e){ alert('이 브라우저에선 복사가 안돼요. PNG 저장을 써주세요.'); }
});
</script>
</body>
</html>
